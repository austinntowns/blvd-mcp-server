        - heading "Platform Webhooks" [level=3] [ref=e87]
        - paragraph [ref=e88]: You can use webhook subscriptions to receive notifications when particular events occur in your business. Rather than having to make API calls periodically, webhooks allow you to receive instant notifications when an event occurs that you'd like to take action on by executing custom code. For example, say you want to create an appointment in an external application when one is booked in Boulevard. A subscription to the appointment.created webhook would make a POST request to your specified endpoint with the booked appointment's data for you to use to use to create the appointment in the external system.
        - paragraph [ref=e89]:
          - text: By using webhook subscriptions you can make fewer API calls overall, which makes sure that your apps are more efficient and update quickly. For more information about how to subscribe to webhooks and a list of all supported event types, check out our
          - link "Using Webhooks Guide" [ref=e90] [cursor=pointer]:
            - /url: ../2020-01/admin-api/guides/webhooks/
