        - heading "Admin API" [level=1] [ref=e54]
        - paragraph [ref=e55]: Manage business operations. In contrast with the Client API, which focuses on experiences seen from the customer perspective, the Admin API enables developers to build apps around merchant-facing actions, such as employee and inventory management.
        - heading "Using the Admin API, you can:" [level=3] [ref=e56]
        - list [ref=e57]:
